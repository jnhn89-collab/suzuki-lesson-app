<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:16px;text-align:center}
.header h1{font-size:18px;margin-bottom:2px}
.header p{font-size:11px;color:#94a3b8}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:99}
.tab{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;color:#94a3b8;text-align:center;border-bottom:3px solid transparent;font-weight:500}
.tab.active{color:#1e40af;border-bottom-color:#3b82f6;font-weight:700;background:#fff}
.page{display:none;padding:14px;max-width:520px;margin:0 auto}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #e2e8f0}
.card-title{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;width:100%;margin-top:8px}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-success{background:#22c55e;color:#fff}
.btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-sm{padding:6px 12px;width:auto;font-size:11px;margin:0}
select,input,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:8px;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px}
.chip-group{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.chip{padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid #d1d5db;background:#f9fafb;color:#6b7280;font-weight:500;transition:.15s}
.chip.selected{background:#3b82f6;color:#fff;border-color:#2563eb;font-weight:600}
.chip.correction{font-size:10px;text-align:left;line-height:1.3;border-radius:8px}
.chip.correction.selected{background:#fef2f2;color:#dc2626;border-color:#fca5a5}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.score-row .label{font-size:12px;font-weight:600;min-width:56px}
.score-row .dots{display:flex;gap:4px}
.dot{width:32px;height:32px;border-radius:50%;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800;font-size:13px;color:#9ca3af;transition:.15s}
.dot.s1{--c:#ef4444}.dot.s2{--c:#f97316}.dot.s3{--c:#eab308}.dot.s4{--c:#22c55e}.dot.s5{--c:#7c3aed}
.dot.active{background:var(--c);color:#fff;border-color:var(--c)}
.student-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;cursor:pointer;border:1px solid #e5e7eb;margin-bottom:6px;transition:.15s}
.student-card:hover{background:#f0f9ff;border-color:#93c5fd}
.student-card .avatar{width:36px;height:36px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.student-card .info{flex:1}
.student-card .info .name{font-weight:700;font-size:13px}
.student-card .info .detail{font-size:11px;color:#6b7280}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-green{background:#dcfce7;color:#166534}
.badge-yellow{background:#fef9c3;color:#854d0e}
.avg-badge{padding:4px 12px;border-radius:16px;font-weight:800;font-size:14px}
.alert{padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:8px}
.alert-info{background:#dbeafe;color:#1e40af;border-left:4px solid #3b82f6}
.alert-warning{background:#fef3c7;color:#92400e;border-left:4px solid #f59e0b}
.alert-success{background:#dcfce7;color:#166534;border-left:4px solid #22c55e}
.loading{text-align:center;padding:40px;color:#94a3b8}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.radar-container{text-align:center;margin:10px 0}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;margin-bottom:4px;font-size:12px}
.history-row:nth-child(odd){background:#f8fafc}
.section-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:6px;margin-top:12px}
.empty-state{text-align:center;padding:30px;color:#9ca3af;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>🎻 스즈키 레슨 시스템</h1>
  <p>교사용 · 레슨 기록 & 학생 관리</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('home')">🏠 홈</div>
  <div class="tab" onclick="showPage('lesson')">📝 레슨</div>
  <div class="tab" onclick="showPage('students')">👥 학생</div>
  <div class="tab" onclick="showPage('curriculum')">📚 곡</div>
</div>

<!-- ═══ HOME ═══ -->
<div id="page-home" class="page active">
  <div class="alert alert-info">📝 레슨 탭에서 오늘의 레슨을 기록하세요</div>
  <div class="card">
    <div class="card-title">📅 오늘의 학생</div>
    <div id="home-students"><div class="loading"><div class="spinner"></div><br>로딩 중...</div></div>
  </div>
  <div class="card">
    <div class="card-title">📊 최근 기록</div>
    <div id="home-recent"><div class="empty-state">아직 레슨 기록이 없습니다</div></div>
  </div>
</div>

<!-- ═══ LESSON FORM ═══ -->
<div id="page-lesson" class="page">
  <div class="card">
    <div class="card-title">📝 레슨 기록</div>
    
    <label>학생 선택</label>
    <select id="les-student" onchange="onStudentSelect()"><option value="">-- 선택 --</option></select>
    
    <label>날짜</label>
    <input type="date" id="les-date">
    
    <label>진행곡</label>
    <select id="les-piece"><option value="">-- 학생 선택 후 자동 --</option></select>
    
    <label>곡 상태</label>
    <select id="les-status">
      <option value="in_progress">📖 진행중</option>
      <option value="completed">✅ 완료</option>
      <option value="review">🔄 복습</option>
    </select>
  </div>

  <div class="card">
    <div class="card-title">🎯 학습 포커스 <span style="font-weight:400;font-size:11px;color:#9ca3af">(최대 3개)</span></div>
    <div id="focus-tags"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">📏 루브릭 점수</div>
      <div id="avg-display" class="avg-badge" style="background:#fef9c3;color:#854d0e">평균 0.0</div>
    </div>
    <div id="rubric-scores"></div>
  </div>

  <div class="card">
    <div class="card-title">🔧 교정 포인트</div>
    <div id="correction-chips"></div>
    <label style="margin-top:8px">추가 메모</label>
    <textarea id="les-corrections-free" rows="2" placeholder="자유 메모 (선택)"></textarea>
  </div>

  <div class="card">
    <div class="card-title">📋 연습 과제</div>
    <label>음계/토널라이제이션</label>
    <input id="les-scales" placeholder="예: G장조 1옥타브 × 3회">
    <label>복습곡</label>
    <input id="les-review" placeholder="예: 1.08 Allegro × 2회">
    <label>진행곡 구간</label>
    <input id="les-sections" placeholder="예: 마디 1-8 × 5회">
    <div style="display:flex;gap:8px">
      <div style="flex:1"><label>일일 반복</label><input type="number" id="les-reps" value="5"></div>
      <div style="flex:1"><label>일일 시간(분)</label><input type="number" id="les-minutes" value="20"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💬 교사 종합 코멘트</div>
    <textarea id="les-comment" rows="3" placeholder="학부모에게 전달될 코멘트"></textarea>
  </div>

  <button class="btn btn-primary" onclick="saveLessonRecord()" id="btn-save">💾 레슨 기록 저장</button>
  <div id="save-result" style="margin-top:8px"></div>
</div>

<!-- ═══ STUDENTS ═══ -->
<div id="page-students" class="page">
  <div class="card">
    <div class="card-title">👥 학생 명부</div>
    <div id="student-list"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <button class="btn btn-secondary" onclick="toggleAddStudent()">➕ 새 학생 등록</button>
  <div id="add-student-form" style="display:none;margin-top:8px">
    <div class="card">
      <div class="card-title">➕ 새 학생</div>
      <label>이름</label><input id="new-name" placeholder="학생 이름">
      <label>연령대</label>
      <select id="new-age"><option>4-6</option><option>6-8</option><option selected>8-10</option><option>10-12</option><option>12+</option></select>
      <label>학부모 이메일</label><input id="new-email" type="email" placeholder="선택사항">
      <label>학부모 PIN (4자리)</label><input id="new-pin" maxlength="4" placeholder="1234">
      <label>시작 곡</label>
      <select id="new-piece"><option value="1.01">1.01 Twinkle Variations</option></select>
      <button class="btn btn-success" onclick="addNewStudent()">✅ 등록</button>
    </div>
  </div>

  <!-- Student Detail (동적) -->
  <div id="student-detail" style="display:none;margin-top:12px">
    <div class="card">
      <div class="card-title" id="detail-name">학생 상세</div>
      <div id="detail-progress"></div>
    </div>
    <div class="card">
      <div class="card-title">📊 최근 점수</div>
      <div class="radar-container" id="detail-radar"></div>
    </div>
    <div class="card">
      <div class="card-title">📋 레슨 이력</div>
      <div id="detail-history"></div>
    </div>
  </div>
</div>

<!-- ═══ CURRICULUM ═══ -->
<div id="page-curriculum" class="page">
  <div class="card">
    <div class="card-title">📚 커리큘럼 탐색기</div>
    <select id="cur-book" onchange="loadCurriculum()">
      <option value="1">Book 1</option>
    </select>
    <div id="curriculum-list"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var state = {
  students: [],
  curriculum: [],
  focusTags: {},
  corrections: [],
  selectedFocus: [],
  selectedCorrections: [],
  scores: { sc_posture:3, sc_intonation:3, sc_rhythm:3, sc_tone:3, sc_bow:3, sc_musicality:3 },
  rubricCats: [],
  currentStudentId: null
};

var COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#7c3aed'];

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.getElementById('les-date').value = new Date().toISOString().split('T')[0];

// Promise wrapper for google.script.run
function gas(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn].apply(runner, args);
  });
}

// Load initial data
Promise.all([
  gas('api_getStudents'),
  gas('api_getCurriculum'),
  gas('api_getFocusTags'),
  gas('api_getCorrectionPresets'),
  gas('api_getRubricCategories')
]).then(function(results) {
  state.students = results[0] || [];
  state.curriculum = results[1] || [];
  state.focusTags = results[2] || {};
  state.corrections = results[3] || [];
  state.rubricCats = results[4] || [];
  renderAll();
}).catch(function(e) {
  var errMsg = '<div class="alert alert-warning">⚠ 데이터 로드 실패: ' + e.message + '<br><br>💡 <b>initialSetup()</b>을 먼저 실행했는지 확인하세요.<br>Apps Script 에디터 → Services.gs → initialSetup 선택 → ▶ 실행</div>';
  document.getElementById('home-students').innerHTML = errMsg;
  document.getElementById('student-list').innerHTML = errMsg;
  document.getElementById('curriculum-list').innerHTML = errMsg;
});

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderHomeStudents();
  renderStudentDropdown();
  renderStudentList();
  renderFocusTags();
  renderRubricScores();
  renderCorrections();
  renderCurriculumPieceDropdown();
  loadCurriculum();
}

function renderHomeStudents() {
  var el = document.getElementById('home-students');
  if (state.students.length === 0) { el.innerHTML = '<div class="empty-state">등록된 학생이 없습니다</div>'; return; }
  el.innerHTML = state.students.map(function(s) {
    var piece = state.curriculum.find(function(p) { return p.piece_id === s.current_piece_id; });
    return '<div class="student-card" onclick="startLesson(\'' + s.student_id + '\')">' +
      '<div class="avatar">' + s.name.charAt(0) + '</div>' +
      '<div class="info"><div class="name">' + s.name + '</div>' +
      '<div class="detail">Book ' + s.current_book + ' · ' + (piece ? piece.title : s.current_piece_id) + '</div></div>' +
      '<span class="badge badge-blue">레슨 시작 →</span></div>';
  }).join('');
}

function renderStudentDropdown() {
  var sel = document.getElementById('les-student');
  sel.innerHTML = '<option value="">-- 학생 선택 --</option>' +
    state.students.map(function(s) {
      return '<option value="' + s.student_id + '">' + s.name + ' (Book ' + s.current_book + ')</option>';
    }).join('');
  
  // 새 학생 등록 곡 드롭다운
  var pSel = document.getElementById('new-piece');
  pSel.innerHTML = state.curriculum.map(function(p) {
    return '<option value="' + p.piece_id + '">' + p.piece_id + ' ' + p.title + '</option>';
  }).join('');
}

function renderStudentList() {
  var el = document.getElementById('student-list');
  if (state.students.length === 0) { el.innerHTML = '<div class="empty-state">학생을 등록하세요</div>'; return; }
  el.innerHTML = state.students.map(function(s) {
    var piece = state.curriculum.find(function(p) { return p.piece_id === s.current_piece_id; });
    return '<div class="student-card" onclick="showStudentDetail(\'' + s.student_id + '\')">' +
      '<div class="avatar">' + s.name.charAt(0) + '</div>' +
      '<div class="info"><div class="name">' + s.name + '</div>' +
      '<div class="detail">Book ' + s.current_book + ' · ' + (piece ? piece.title : s.current_piece_id) + '</div></div>' +
      '<span class="badge badge-green">상세 →</span></div>';
  }).join('');
}

function renderFocusTags() {
  var el = document.getElementById('focus-tags');
  var html = '';
  Object.keys(state.focusTags).forEach(function(group) {
    html += '<div class="section-label">' + group + '</div><div class="chip-group">';
    state.focusTags[group].forEach(function(tag) {
      var sel = state.selectedFocus.indexOf(tag) >= 0;
      html += '<div class="chip' + (sel ? ' selected' : '') + '" onclick="toggleFocus(\'' + tag + '\')">' + tag + '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderRubricScores() {
  var el = document.getElementById('rubric-scores');
  el.innerHTML = state.rubricCats.map(function(cat) {
    var dots = '';
    for (var i = 1; i <= 5; i++) {
      var active = state.scores[cat.col] === i;
      dots += '<div class="dot s' + i + (active ? ' active' : '') + '" onclick="setScore(\'' + cat.col + '\',' + i + ')">' + i + '</div>';
    }
    return '<div class="score-row"><span style="font-size:16px">' + cat.icon + '</span><span class="label">' + cat.name + '</span><div class="dots">' + dots + '</div></div>';
  }).join('');
  updateAvgDisplay();
}

function renderCorrections() {
  var el = document.getElementById('correction-chips');
  el.innerHTML = '<div class="chip-group">' + state.corrections.map(function(c, i) {
    var sel = state.selectedCorrections.indexOf(c) >= 0;
    return '<div class="chip correction' + (sel ? ' selected' : '') + '" onclick="toggleCorrection(' + i + ')">' + (sel ? '✓ ' : '') + c + '</div>';
  }).join('') + '</div>';
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  var tabs = document.querySelectorAll('.tab');
  var idx = { home:0, lesson:1, students:2, curriculum:3 }[name];
  if (tabs[idx]) tabs[idx].classList.add('active');
}

function startLesson(studentId) {
  showPage('lesson');
  document.getElementById('les-student').value = studentId;
  onStudentSelect();
}

function onStudentSelect() {
  var sid = document.getElementById('les-student').value;
  if (!sid) return;
  var student = state.students.find(function(s) { return s.student_id === sid; });
  if (!student) return;

  // 곡 드롭다운을 현재 Book으로 필터
  var pieces = state.curriculum.filter(function(p) { return parseInt(p.book) === parseInt(student.current_book); });
  var sel = document.getElementById('les-piece');
  sel.innerHTML = pieces.map(function(p) {
    var selected = p.piece_id === student.current_piece_id ? ' selected' : '';
    return '<option value="' + p.piece_id + '"' + selected + '>' + p.piece_id + ' ' + p.title + '</option>';
  }).join('');
}

function toggleFocus(tag) {
  var idx = state.selectedFocus.indexOf(tag);
  if (idx >= 0) state.selectedFocus.splice(idx, 1);
  else if (state.selectedFocus.length < 3) state.selectedFocus.push(tag);
  renderFocusTags();
}

function setScore(col, val) {
  state.scores[col] = val;
  renderRubricScores();
}

function updateAvgDisplay() {
  var sum = 0; var count = 0;
  Object.keys(state.scores).forEach(function(k) { sum += state.scores[k]; count++; });
  var avg = (sum / count).toFixed(1);
  var el = document.getElementById('avg-display');
  el.textContent = '평균 ' + avg;
  el.style.background = avg >= 4 ? '#dcfce7' : avg >= 3 ? '#fef9c3' : '#fee2e2';
  el.style.color = avg >= 4 ? '#166534' : avg >= 3 ? '#854d0e' : '#991b1b';
}

function toggleCorrection(i) {
  var c = state.corrections[i];
  var idx = state.selectedCorrections.indexOf(c);
  if (idx >= 0) state.selectedCorrections.splice(idx, 1);
  else state.selectedCorrections.push(c);
  renderCorrections();
}

// ═══════════════════════════════════════════════
// SAVE LESSON
// ═══════════════════════════════════════════════
function saveLessonRecord() {
  var btn = document.getElementById('btn-save');
  var res = document.getElementById('save-result');
  btn.disabled = true;
  btn.textContent = '⏳ 저장 중...';
  res.innerHTML = '';

  var data = {
    student_id: document.getElementById('les-student').value,
    date: document.getElementById('les-date').value,
    piece_id: document.getElementById('les-piece').value,
    piece_status: document.getElementById('les-status').value,
    focus_tags: state.selectedFocus,
    sc_posture: state.scores.sc_posture,
    sc_intonation: state.scores.sc_intonation,
    sc_rhythm: state.scores.sc_rhythm,
    sc_tone: state.scores.sc_tone,
    sc_bow: state.scores.sc_bow,
    sc_musicality: state.scores.sc_musicality,
    corrections: state.selectedCorrections,
    corrections_free: document.getElementById('les-corrections-free').value,
    teacher_comment: document.getElementById('les-comment').value,
    assignment: {
      scales: document.getElementById('les-scales').value,
      review_pieces: document.getElementById('les-review').value,
      current_piece_sections: document.getElementById('les-sections').value,
      daily_reps: parseInt(document.getElementById('les-reps').value) || 5,
      daily_minutes: parseInt(document.getElementById('les-minutes').value) || 20
    }
  };

  gas('api_saveLessonRecord', data).then(function(result) {
    btn.disabled = false;
    btn.textContent = '💾 레슨 기록 저장';
    if (result.success) {
      res.innerHTML = '<div class="alert alert-success">✅ 저장 완료! 레슨 #' + result.lessonNum + ' (평균 ' + result.avgScore + ')</div>';
      if (result.skillGaps && result.skillGaps.length > 0) {
        res.innerHTML += '<div class="alert alert-warning">⚠ 스킬 갭 감지: ' + result.skillGaps.map(function(g){return g.message;}).join(', ') + '</div>';
      }
      // 리셋
      state.selectedFocus = [];
      state.selectedCorrections = [];
      state.scores = { sc_posture:3, sc_intonation:3, sc_rhythm:3, sc_tone:3, sc_bow:3, sc_musicality:3 };
      document.getElementById('les-corrections-free').value = '';
      document.getElementById('les-comment').value = '';
      renderFocusTags(); renderRubricScores(); renderCorrections();
      // 학생 목록 새로고침
      gas('api_getStudents').then(function(s) { state.students = s; renderAll(); });
    } else {
      res.innerHTML = '<div class="alert alert-warning">❌ 오류: ' + (result.error || '알 수 없는 오류') + '</div>';
    }
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '💾 레슨 기록 저장';
    res.innerHTML = '<div class="alert alert-warning">❌ ' + e.message + '</div>';
  });
}

// ═══════════════════════════════════════════════
// STUDENT DETAIL
// ═══════════════════════════════════════════════
function showStudentDetail(studentId) {
  state.currentStudentId = studentId;
  var detail = document.getElementById('student-detail');
  detail.style.display = 'block';
  document.getElementById('detail-name').textContent = '⏳ 로딩 중...';
  document.getElementById('detail-progress').innerHTML = '';
  document.getElementById('detail-radar').innerHTML = '';
  document.getElementById('detail-history').innerHTML = '';

  gas('api_getStudentProgress', studentId).then(function(data) {
    if (!data) { document.getElementById('detail-name').textContent = '❌ 데이터 없음'; return; }
    var s = data.student;
    document.getElementById('detail-name').textContent = '🧒 ' + s.name;

    // Progress bar
    var bp = data.bookProgress;
    document.getElementById('detail-progress').innerHTML =
      '<div style="margin-bottom:8px;font-size:12px">Book ' + s.current_book + ' · ' + (data.currentPiece ? data.currentPiece.title : s.current_piece_id) + '</div>' +
      '<div style="background:#e5e7eb;border-radius:6px;height:18px;overflow:hidden;position:relative">' +
      '<div style="background:linear-gradient(90deg,#3b82f6,#7c3aed);height:100%;width:' + bp.percent + '%;border-radius:6px"></div>' +
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">' + bp.completed + '/' + bp.total + '곡 (' + bp.percent + '%)</div></div>' +
      '<div style="font-size:11px;color:#6b7280;margin-top:4px">총 ' + data.totalLessons + '회 레슨</div>';

    // Radar (SVG)
    if (data.recentScores && data.recentScores.length > 0) {
      var latest = data.recentScores[0].scores;
      var vals = [latest.posture, latest.intonation, latest.rhythm, latest.tone, latest.bow, latest.musicality];
      var labels = ['자세','음정','리듬','톤','활','음악성'];
      var cx=100, cy=95, R=70;
      var svg = '<svg viewBox="0 0 200 200" style="width:100%;max-width:220px">';
      for(var g=1;g<=5;g++){
        var pts=[];for(var j=0;j<6;j++){var a=Math.PI*2*j/6-Math.PI/2;pts.push((cx+g/5*R*Math.cos(a))+','+(cy+g/5*R*Math.sin(a)));}
        svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#e5e7eb" stroke-width="'+(g===3?1.2:0.4)+'"/>';
      }
      var dataPts=[];
      for(var k=0;k<6;k++){var an=Math.PI*2*k/6-Math.PI/2;var r=vals[k]/5*R;dataPts.push((cx+r*Math.cos(an))+','+(cy+r*Math.sin(an)));
        svg+='<circle cx="'+(cx+r*Math.cos(an))+'" cy="'+(cy+r*Math.sin(an))+'" r="3" fill="#3b82f6"/>';
        var lx=cx+88*Math.cos(an),ly=cy+88*Math.sin(an);
        svg+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="middle" font-size="8" font-weight="600" fill="#374151">'+labels[k]+'</text>';
      }
      svg+='<polygon points="'+dataPts.join(' ')+'" fill="rgba(59,130,246,.12)" stroke="#3b82f6" stroke-width="2"/>';
      svg+='</svg>';
      document.getElementById('detail-radar').innerHTML = svg;
    }

    // History
    if (data.recentScores && data.recentScores.length > 0) {
      document.getElementById('detail-history').innerHTML = data.recentScores.map(function(l) {
        var avgColor = l.avg >= 4 ? '#16a34a' : l.avg >= 3 ? '#ca8a04' : '#dc2626';
        return '<div class="history-row"><div><div style="font-weight:600">' + l.piece + '</div><div style="font-size:10px;color:#9ca3af">' + l.date + '</div></div>' +
          '<div style="font-weight:800;font-size:16px;color:' + avgColor + '">' + l.avg.toFixed(1) + '</div></div>';
      }).join('');
    } else {
      document.getElementById('detail-history').innerHTML = '<div class="empty-state">레슨 이력이 없습니다</div>';
    }
  });
}

// ═══════════════════════════════════════════════
// ADD STUDENT
// ═══════════════════════════════════════════════
function toggleAddStudent() {
  var el = document.getElementById('add-student-form');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function addNewStudent() {
  var data = {
    name: document.getElementById('new-name').value,
    age_group: document.getElementById('new-age').value,
    parent_email: document.getElementById('new-email').value,
    pin: document.getElementById('new-pin').value || '1234',
    current_piece_id: document.getElementById('new-piece').value
  };
  if (!data.name) { alert('이름을 입력하세요'); return; }

  gas('api_addStudent', data).then(function(result) {
    if (result.success) {
      alert('✅ ' + data.name + ' 등록 완료!');
      toggleAddStudent();
      gas('api_getStudents').then(function(s) { state.students = s; renderAll(); });
    }
  }).catch(function(e) { alert('오류: ' + e.message); });
}

// ═══════════════════════════════════════════════
// CURRICULUM
// ═══════════════════════════════════════════════
function loadCurriculum() {
  var book = parseInt(document.getElementById('cur-book').value) || 1;
  var pieces = state.curriculum.filter(function(p) { return parseInt(p.book) === book; });
  var el = document.getElementById('curriculum-list');
  
  if (pieces.length === 0) { el.innerHTML = '<div class="empty-state">해당 Book의 곡이 없습니다</div>'; return; }
  
  el.innerHTML = pieces.map(function(p) {
    var tps = p.teaching_points ? p.teaching_points.split('|').map(function(t){return '<span style="background:#eff6ff;padding:2px 6px;border-radius:4px;font-size:10px;color:#1e40af">'+t+'</span>';}).join(' ') : '';
    var prereqs = p.prereq_skills ? p.prereq_skills.split('|').map(function(s){return '<span style="background:#fef9c3;padding:2px 6px;border-radius:4px;font-size:10px;color:#854d0e">'+s+'</span>';}).join(' ') : '';
    return '<div style="padding:10px 0;border-bottom:1px solid #f3f4f6">' +
      '<div style="font-weight:700;font-size:13px">' + p.piece_id + ' ' + p.title + '</div>' +
      '<div style="font-size:11px;color:#6b7280;margin-bottom:4px">' + p.composer + ' · ' + p.key_sig + ' · ' + p.time_sig + ' · ~' + p.avg_days + '일</div>' +
      '<div style="margin-bottom:4px">' + tps + '</div>' +
      (prereqs ? '<div>선행: ' + prereqs + '</div>' : '') + '</div>';
  }).join('');
}
