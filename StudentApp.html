<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
.header{background:linear-gradient(135deg,#059669,#0d9488);color:#fff;padding:20px 16px;text-align:center}
.header h1{font-size:18px;margin-bottom:2px}
.header p{font-size:11px;color:#a7f3d0}
.card{background:#fff;border-radius:12px;padding:14px;margin:12px 14px;border:1px solid #e2e8f0}
.card-title{font-weight:700;font-size:14px;margin-bottom:10px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:99}
.tab{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:11px;color:#94a3b8;text-align:center;border-bottom:3px solid transparent;font-weight:500}
.tab.active{color:#059669;border-bottom-color:#059669;font-weight:700}
.page{display:none;max-width:520px;margin:0 auto}
.page.active{display:block}
.btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;width:100%}
.btn-green{background:#059669;color:#fff}
.btn-sm{width:auto;padding:8px 14px;font-size:12px}
select,input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:8px;font-family:inherit}
.login-box{max-width:320px;margin:40px auto;padding:0 16px}
.pin-input{text-align:center;font-size:24px;letter-spacing:12px;font-weight:800}
.task-card{border-radius:12px;padding:14px;margin:12px 14px;border:2px solid #e5e7eb;transition:.2s}
.task-card.done{border-color:#22c55e;background:#f0fdf4}
.task-card .task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.task-card .task-title{font-weight:700;font-size:13px}
.task-card .task-desc{font-size:12px;color:#6b7280;line-height:1.5}
.check-btn{width:40px;height:40px;border-radius:50%;border:3px solid #d1d5db;background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s}
.check-btn.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.badge-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;background:#fafafa;border:1px solid #e5e7eb}
.badge-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.review-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;margin-bottom:6px;background:#f0f9ff;border:1px solid #bae6fd;cursor:pointer}
.streak-bar{background:#fef3c7;border-radius:10px;padding:12px 16px;margin:12px 14px;text-align:center;border:1px solid #fde68a}
.empty{text-align:center;padding:30px;color:#9ca3af;font-size:13px}
#login-page{display:block}
#main-content{display:none}
</style>
</head>
<body>

<div class="header">
  <h1>🎻 나의 연습</h1>
  <p id="header-sub">스즈키 바이올린</p>
</div>

<!-- ═══ LOGIN ═══ -->
<div id="login-page">
  <div class="login-box">
    <div class="card">
      <div class="card-title">🧒 로그인</div>
      <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px">이름 선택</label>
      <select id="login-student"><option value="">로딩 중...</option></select>
      <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px">PIN</label>
      <input type="password" id="login-pin" class="pin-input" maxlength="4" placeholder="····" inputmode="numeric">
      <button class="btn btn-green" onclick="doLogin()" style="margin-top:8px">시작하기! 🎵</button>
      <div id="login-error"></div>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main-content">
  <div id="streak-display" class="streak-bar" style="display:none">
    🔥 <span id="streak-count">0</span>일 연속 연습 중!
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('practice')">🎯 연습</div>
    <div class="tab" onclick="showTab('review')">🔄 복습</div>
    <div class="tab" onclick="showTab('badges')">🏅 뱃지</div>
  </div>

  <!-- PRACTICE TAB -->
  <div id="tab-practice" class="page active">
    <div id="practice-tasks"><div class="empty">과제를 불러오는 중...</div></div>
    
    <div class="card" style="margin-top:0">
      <div class="card-title">✏️ 오늘의 연습 기록</div>
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px">반복 횟수</label>
          <input type="number" id="prac-reps" value="5" min="0">
        </div>
        <div style="flex:1">
          <label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px">연습 시간(분)</label>
          <input type="number" id="prac-minutes" value="20" min="0">
        </div>
      </div>
      <button class="btn btn-green" onclick="logPractice()" id="btn-log">✅ 연습 완료!</button>
      <div id="log-result"></div>
    </div>
  </div>

  <!-- REVIEW TAB -->
  <div id="tab-review" class="page">
    <div class="card">
      <div class="card-title">🔄 오늘의 복습곡 추천</div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:10px">이전에 배운 곡을 복습하면 실력이 쑥쑥!</div>
      <div id="review-list"><div class="empty">로딩 중...</div></div>
      <button class="btn btn-sm btn-green" onclick="loadReview()" style="margin-top:8px;width:100%">🔀 다시 추천받기</button>
    </div>
  </div>

  <!-- BADGES TAB -->
  <div id="tab-badges" class="page">
    <div class="card">
      <div class="card-title">🏅 나의 뱃지</div>
      <div id="badge-list"><div class="empty">로딩 중...</div></div>
    </div>
  </div>
</div>

<script>
var token = null;
var checkedTasks = {};

function gas(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn].apply(runner, args);
  });
}

// Load student list
gas('api_parentGetStudents').then(function(students) {
  var sel = document.getElementById('login-student');
  if (!students || students.length === 0) {
    sel.innerHTML = '<option value="">학생이 없습니다 (초기설정 필요)</option>';
    return;
  }
  sel.innerHTML = '<option value="">-- 이름 선택 --</option>' +
    students.map(function(s) {
      return '<option value="' + s.student_id + '">' + s.name + '</option>';
    }).join('');
}).catch(function(e) {
  document.getElementById('login-student').innerHTML = '<option value="">로드 실패</option>';
});

function doLogin() {
  var studentId = document.getElementById('login-student').value;
  var pin = document.getElementById('login-pin').value;
  if (!studentId || !pin) return;

  gas('api_studentLogin', studentId, pin).then(function(result) {
    if (result.success) {
      token = result.token;
      document.getElementById('header-sub').textContent = result.studentName + '의 연습장';
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      loadStudentData();
    } else {
      document.getElementById('login-error').innerHTML = '<div style="color:#dc2626;font-size:12px;margin-top:8px">❌ ' + (result.message || '다시 시도해주세요') + '</div>';
    }
  });
}

function showTab(name) {
  document.querySelectorAll('#main-content .page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-' + name).classList.add('active');
  var idx = {practice:0,review:1,badges:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function loadStudentData() {
  loadAssignment();
  loadReview();
  loadBadges();
}

function loadAssignment() {
  gas('api_studentGetAssignment', token).then(function(assign) {
    var el = document.getElementById('practice-tasks');
    if (!assign || assign.error) { el.innerHTML = '<div class="empty">오늘의 과제가 아직 없어요</div>'; return; }

    var tasks = [];
    if (assign.scales) tasks.push({ id: 'scales', icon: '🎼', title: '음계 연습', desc: assign.scales });
    if (assign.review_pieces) tasks.push({ id: 'review', icon: '🔄', title: '복습곡', desc: assign.review_pieces });
    if (assign.current_piece_sections) tasks.push({ id: 'current', icon: '📖', title: '진행곡', desc: assign.current_piece_sections });

    el.innerHTML = tasks.map(function(t) {
      var done = checkedTasks[t.id];
      return '<div class="task-card' + (done ? ' done' : '') + '" id="task-' + t.id + '">' +
        '<div class="task-header">' +
        '<div class="task-title">' + t.icon + ' ' + t.title + '</div>' +
        '<button class="check-btn' + (done ? ' checked' : '') + '" onclick="toggleTask(\'' + t.id + '\')">' + (done ? '✓' : '') + '</button>' +
        '</div><div class="task-desc">' + t.desc + '</div></div>';
    }).join('');
  });
}

function toggleTask(id) {
  checkedTasks[id] = !checkedTasks[id];
  loadAssignment();
}

function logPractice() {
  var btn = document.getElementById('btn-log');
  btn.disabled = true;
  btn.textContent = '⏳ 기록 중...';

  var data = {
    actual_reps: parseInt(document.getElementById('prac-reps').value) || 0,
    actual_minutes: parseInt(document.getElementById('prac-minutes').value) || 0
  };

  // Find latest assignment
  gas('api_studentGetAssignment', token).then(function(assign) {
    if (assign && assign.assign_id) data.assign_id = assign.assign_id;
    return gas('api_studentLogPractice', token, data);
  }).then(function(result) {
    btn.disabled = false;
    btn.textContent = '✅ 연습 완료!';
    if (result.success) {
      var msg = '🎉 잘했어요! 오늘의 연습이 기록되었습니다!';
      if (result.streak > 1) {
        msg = '🔥 대단해요! ' + result.streak + '일 연속 연습 중!';
        document.getElementById('streak-display').style.display = 'block';
        document.getElementById('streak-count').textContent = result.streak;
      }
      document.getElementById('log-result').innerHTML = '<div style="background:#dcfce7;color:#166534;padding:10px;border-radius:8px;font-size:13px;margin-top:8px;text-align:center;font-weight:600">' + msg + '</div>';
      loadBadges(); // 새 뱃지 체크
    } else {
      document.getElementById('log-result').innerHTML = '<div style="color:#dc2626;font-size:12px;margin-top:8px">오류: ' + (result.error || '') + '</div>';
    }
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '✅ 연습 완료!';
  });
}

function loadReview() {
  gas('api_studentGetReview', token).then(function(reviews) {
    var el = document.getElementById('review-list');
    if (!reviews || reviews.length === 0 || reviews.error) {
      el.innerHTML = '<div class="empty">복습할 곡이 아직 없어요. 더 많은 곡을 배워보세요!</div>';
      return;
    }
    el.innerHTML = reviews.map(function(r) {
      var days = Math.floor((Date.now() - new Date(r.lastPlayed).getTime()) / 86400000);
      return '<div class="review-card">' +
        '<div style="font-size:24px">🎵</div>' +
        '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + (r.title || r.piece_id) + '</div>' +
        '<div style="font-size:10px;color:#6b7280">마지막 연주: ' + days + '일 전 · 평균 ' + r.avg.toFixed(1) + '</div></div></div>';
    }).join('');
  });
}

function loadBadges() {
  gas('api_studentGetAchievements', token).then(function(badges) {
    var el = document.getElementById('badge-list');
    if (!badges || badges.length === 0 || badges.error) {
      el.innerHTML = '<div class="empty">아직 뱃지가 없어요. 열심히 연습하면 뱃지를 받을 수 있어요! 🌟</div>';
      return;
    }
    var icons = { book_graduation: '🎓', skill_milestone: '⭐', streak: '🔥', piece_mastery: '🏆' };
    var colors = { book_graduation: '#7c3aed', skill_milestone: '#f59e0b', streak: '#ef4444', piece_mastery: '#22c55e' };
    
    el.innerHTML = badges.map(function(b) {
      return '<div class="badge-card">' +
        '<div class="badge-icon" style="background:' + (colors[b.type] || '#6b7280') + '20">' + (icons[b.type] || '🌟') + '</div>' +
        '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + b.title + '</div>' +
        '<div style="font-size:10px;color:#9ca3af">' + b.achieved_date + (b.description ? ' · ' + b.description : '') + '</div></div></div>';
    }).join('');
  });
}
</script>
</body>
</html>
